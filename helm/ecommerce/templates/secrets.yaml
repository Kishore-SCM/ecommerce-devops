# DO NOT put real values here.
# Create secrets before helm install:
#   kubectl create secret generic db-secret \
#     --from-literal=url=jdbc:postgresql://<RDS>:5432/ecommerce \
#     --from-literal=password=<PASSWORD> -n production
#   kubectl create secret generic jwt-secret \
#     --from-literal=secret=<JWT_SECRET> -n production
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
